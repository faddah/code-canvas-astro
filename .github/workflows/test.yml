name: Tests

on:
  push:
    branches: [main, add-aria]
  pull_request:
    branches: [main]

env:
  CI: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npx -y npm@11 ci
      - run: npm run test:coverage

  e2e-tests:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 15
    env:
      HOME: /root
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
      E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
      - run: npx -y npm@11 ci
      - name: Cache Astro build output
        uses: actions/cache@v5
        with:
          path: |
            dist
            node_modules/.astro
          key: astro-build-${{ hashFiles('src/**', 'astro.config.mjs', 'package-lock.json') }}
          restore-keys: |
            astro-build-
      - name: Generate self-signed TLS cert for HTTPS preview proxy
        run: |
          mkdir -p .certs
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout .certs/localhost+2-key.pem \
            -out .certs/localhost+2.pem \
            -days 30 \
            -subj "/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
      - name: Build Astro for preview
        run: npm run build
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
